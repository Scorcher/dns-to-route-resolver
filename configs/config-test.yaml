# DNS to Route Resolver Configuration

# Logging configuration
log:
  level: "debug"  # debug, info, warn, error

# DNS log file to monitor
dns_log:
  enabled: true  # read log file
  path: "data/query.log"
  follow: true  # Follow log file if rotated

# Network configuration
network:
  # List of domains to monitor (exact matches or subdomains)
  monitored_domains:
    - name: farang
      domains:
        - "example.com"
        - "example.org"
    - name: citizen
      domains:
        - "my-lovely.com"

# BIRD configuration
bird:
  config_path_template: "data/dns-to-route-resolver-%s.lst"
  reload_command: ["true"]
  route_template: "route %s blackhole;\n"

# Metrics configuration
metrics:
  enabled: true
  port: 19091
  path: "/metrics"

# Persistence
persistence:
  # File to store known networks
  state_file: "data/state.json"
  # How often to save state (in seconds)
  save_interval: 300

# Advanced settings
settings:
  # Network mask for routes (24 for /24)
  network_mask: 24
